# ============================================================================
# Azure Pipelines - Power BI Project (PBIP) CI/CD
# ============================================================================
# 
# This is an example pipeline that demonstrates how to use the PBIP templates.
# Copy this file to your Power BI project repository and customize as needed.
#
# Prerequisites:
# 1. Azure AD App Registration with Power BI API permissions
# 2. Variable group 'pbip-shared-secrets' with:
#    - TenantId: Your Azure AD tenant ID
#    - AppId: Service Principal application/client ID
#    - ClientSecret: Service Principal secret
#    - DevWorkspaceId: Target Power BI workspace ID for main branch
#    - FeatureWorkspacePrefix: Prefix for feature workspaces (e.g., "Feature")
#
# 3. For multi-environment CD, also add:
#    - TestWorkspaceId: Test environment workspace ID
#    - ProdWorkspaceId: Production environment workspace ID
# ============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - main
      - develop

# ============================================================================
# Option 1: Use branch-aware template (recommended for feature branch workflow)
# ============================================================================
# Uncomment to use:
# 
# extends:
#   template: templates/pbip-ci-branch-aware.yml
#   parameters:
#     pbipPath: '.'
#     variableGroup: 'pbip-shared-secrets'
#     deployScriptPath: './scripts/deploy-dynamic.ps1'

# ============================================================================
# Option 2: Use basic CI template (validation only, manual deployment)
# ============================================================================
# Uncomment to use:
#
# extends:
#   template: templates/pbip-ci.yml
#   parameters:
#     pbipPath: '.'
#     publishArtifacts: true

# ============================================================================
# Option 3: Use CI with Best Practice Rules
# ============================================================================
# Uncomment to use:
#
# extends:
#   template: templates/pbip-ci-with-rules.yml
#   parameters:
#     pbipPath: '.'
#     failOnWarnings: false

# ============================================================================
# Option 4: Inline pipeline (full control)
# ============================================================================

pool:
  vmImage: 'windows-latest'

variables:
  - group: pbip-shared-secrets
  - name: pbipPath
    value: '.'

stages:
  # ----------------------------------------
  # Stage 1: CI - Validate PBIP
  # ----------------------------------------
  - stage: CI
    displayName: 'Build & Validate'
    jobs:
      - job: Validate
        displayName: 'Validate PBIP Structure'
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/steps/pbip-validate.yml
            parameters:
              pbipPath: $(pbipPath)

          - template: templates/steps/pbip-artifacts.yml
            parameters:
              pbipPath: $(pbipPath)
              artifactName: 'pbip-drop'

  # ----------------------------------------
  # Stage 2: Deploy to Dev (main/develop branches only)
  # ----------------------------------------
  - stage: Deploy_Dev
    displayName: 'Deploy to Dev'
    dependsOn: CI
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        )
      )
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to Dev Workspace'
        environment: 'PowerBI-Dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: pbip-drop

                - task: PowerShell@2
                  displayName: 'Deploy PBIP to Dev'
                  inputs:
                    targetType: filePath
                    filePath: '$(Pipeline.Workspace)/pbip-drop/../scripts/deploy-dynamic.ps1'
                    arguments: >
                      -Branch "$(Build.SourceBranch)"
                      -TenantId "$(TenantId)"
                      -AppId "$(AppId)"
                      -ClientSecret "$(ClientSecret)"
                      -DevWorkspaceId "$(DevWorkspaceId)"
                      -PbipPath "$(Pipeline.Workspace)/pbip-drop"

  # ----------------------------------------
  # Stage 3: Deploy to Feature Workspace (feature/* branches only)
  # ----------------------------------------
  - stage: Deploy_Feature
    displayName: 'Deploy to Feature Workspace'
    dependsOn: CI
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')
      )
    jobs:
      - job: DeployFeature
        displayName: 'Deploy to Feature Workspace'
        steps:
          - download: current
            artifact: pbip-drop

          - task: PowerShell@2
            displayName: 'Create/Deploy to Feature Workspace'
            inputs:
              targetType: filePath
              filePath: '$(Pipeline.Workspace)/pbip-drop/../scripts/deploy-dynamic.ps1'
              arguments: >
                -Branch "$(Build.SourceBranch)"
                -TenantId "$(TenantId)"
                -AppId "$(AppId)"
                -ClientSecret "$(ClientSecret)"
                -DevWorkspaceId "$(DevWorkspaceId)"
                -FeatureWorkspacePrefix "$(FeatureWorkspacePrefix)"
                -PbipPath "$(Pipeline.Workspace)/pbip-drop"
