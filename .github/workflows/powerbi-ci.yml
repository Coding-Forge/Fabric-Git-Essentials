name: Power BI CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      skip_dataset_rules:
        description: "Skip dataset quality rules"
        required: false
        default: false
        type: boolean
      skip_report_rules:
        description: "Skip report quality rules"
        required: false
        default: false
        type: boolean
      skip_dax_tests:
        description: "Skip DAX tests"
        required: false
        default: false
        type: boolean
      skip_publish:
        description: "Skip PBIP artifact upload"
        required: false
        default: false
        type: boolean

env:
  PROJECT_ROOT: projects
  PBIP_PATH: shared/pbip-local
  PYTHON_VERSION: "3.11"
  DEPLOY_SCRIPT_PATH: shared/scripts/deploy-dynamic.ps1
  # Optional repo/org variables to set defaults across all runs.
  # Valid values: true or false.
  SKIP_DATASET_RULES: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_dataset_rules || vars.PBIP_CI_SKIP_DATASET_RULES || 'false' }}
  SKIP_REPORT_RULES: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_report_rules || vars.PBIP_CI_SKIP_REPORT_RULES || 'false' }}
  SKIP_DAX_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_dax_tests || vars.PBIP_CI_SKIP_DAX_TESTS || 'false' }}
  SKIP_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_publish || vars.PBIP_CI_SKIP_PUBLISH || 'false' }}

jobs:
  validate_pbip:
    name: Validate PBIP Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run PBIP structure validation
        run: python shared/tests/validate_pbip_structure.py --pbip-path "${{ env.PBIP_PATH }}"

  dataset_rules:
    name: Run Dataset Quality Rules
    runs-on: windows-latest
    needs: validate_pbip
    if: ${{ needs.validate_pbip.result == 'success' && vars.PBIP_CI_SKIP_DATASET_RULES != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Tabular Editor and fallback rules
        shell: pwsh
        run: |
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"
          $toolPath = Join-Path $tempPath "TE"

          New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
          New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

          Write-Host "Downloading Tabular Editor binaries"
          $downloadUrl = "https://github.com/TabularEditor/TabularEditor/releases/latest/download/TabularEditor.Portable.zip"
          $zipFile = Join-Path $tempPath "TabularEditor.zip"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

          Write-Host "Downloading dataset fallback rules"
          $rulesUrl = "https://raw.githubusercontent.com/microsoft/Analysis-Services/master/BestPracticeRules/BPARules.json"
          Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Dataset.fallback.json")

      - name: Prepare dataset rules for branch policy
        shell: pwsh
        run: |
          $repoPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:PROJECT_ROOT"
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"

          $sourceRulesPath = Join-Path $repoPath "Rules-Dataset.json"
          if (!(Test-Path $sourceRulesPath)) {
              $sourceRulesPath = Join-Path $tempPath "Rules-Dataset.fallback.json"
          }

          $effectiveRulesPath = Join-Path $tempPath "Rules-Dataset.effective.json"
          $qualityBranch = "$env:GITHUB_REF"
          if (![string]::IsNullOrWhiteSpace($env:GITHUB_BASE_REF)) {
              $qualityBranch = "refs/heads/$env:GITHUB_BASE_REF"
          }

          & (Join-Path $repoPath "scripts\Prepare-QualityRules.ps1") `
            -Mode dataset `
            -SourcePath $sourceRulesPath `
            -OutputPath $effectiveRulesPath `
            -SourceBranch $qualityBranch

      - name: Run dataset rules
        shell: pwsh
        run: |
          $repoPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:PROJECT_ROOT"
          $pbipPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:PBIP_PATH"
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"
          $toolPath = Join-Path $tempPath "TE\TabularEditor.exe"
          $rulesPath = Join-Path $tempPath "Rules-Dataset.effective.json"

          if (!(Test-Path $toolPath)) {
              throw "Tabular Editor executable not found: $toolPath"
          }

          if (!(Test-Path $rulesPath)) {
              throw "Prepared dataset rules not found: $rulesPath"
          }

          $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include ("*.pbidataset", "*.pbism")
          if (!$itemsFolders) {
              throw "No semantic model definitions found under $pbipPath"
          }

          foreach ($itemFolder in $itemsFolders) {
              $itemPath = Join-Path $itemFolder.Directory.FullName "definition"
              if (!(Test-Path $itemPath)) {
                  $itemPath = Join-Path $itemFolder.Directory.FullName "model.bim"
                  if (!(Test-Path $itemPath)) {
                      throw "Cannot find semantic model definition for $($itemFolder.FullName)"
                  }
              }

              Write-Host "Running rules for: $itemPath"
              & $toolPath "$itemPath" -A "$rulesPath" -V
              if ($LASTEXITCODE -ne 0) {
                  throw "Tabular Editor rules failed for $itemPath with exit code $LASTEXITCODE"
              }
          }

  report_rules:
    name: Run Report Quality Rules
    runs-on: windows-latest
    needs: validate_pbip
    if: ${{ needs.validate_pbip.result == 'success' && vars.PBIP_CI_SKIP_REPORT_RULES != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Fab Inspector and fallback rules
        shell: pwsh
        run: |
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"
          $toolPath = Join-Path $tempPath "PBIInspector"

          New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
          New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

          Write-Host "Downloading Fab Inspector"
          $downloadUrl = "https://github.com/NatVanG/PBI-InspectorV2/releases/latest/download/win-x64-CLI.zip"
          $zipFile = Join-Path $tempPath "PBIRInspector.zip"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

          Write-Host "Downloading report fallback rules"
          $rulesUrl = "https://raw.githubusercontent.com/NatVanG/PBI-InspectorV2/main/Rules/Base-rules.json"
          Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Report.fallback.json")

      - name: Prepare report rules for branch policy
        shell: pwsh
        run: |
          $repoPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:PROJECT_ROOT"
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"

          $sourceRulesPath = Join-Path $repoPath "Rules-Report.json"
          if (!(Test-Path $sourceRulesPath)) {
              $sourceRulesPath = Join-Path $tempPath "Rules-Report.fallback.json"
          }

          $effectiveRulesPath = Join-Path $tempPath "Rules-Report.effective.json"
          $qualityBranch = "$env:GITHUB_REF"
          if (![string]::IsNullOrWhiteSpace($env:GITHUB_BASE_REF)) {
              $qualityBranch = "refs/heads/$env:GITHUB_BASE_REF"
          }

          & (Join-Path $repoPath "scripts\Prepare-QualityRules.ps1") `
            -Mode report `
            -SourcePath $sourceRulesPath `
            -OutputPath $effectiveRulesPath `
            -SourceBranch $qualityBranch

      - name: Run report rules
        shell: pwsh
        run: |
          $pbipPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:PBIP_PATH"
          $tempPath = Join-Path "$env:RUNNER_TEMP" "pbip-quality"
          $toolPath = Join-Path $tempPath "PBIInspector\win-x64\CLI\PBIRInspectorCLI.exe"
          $rulesPath = Join-Path $tempPath "Rules-Report.effective.json"

          if (!(Test-Path $toolPath)) {
              throw "Fab Inspector executable not found: $toolPath"
          }

          if (!(Test-Path $rulesPath)) {
              throw "Prepared report rules not found: $rulesPath"
          }

          $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include *.pbir
          if (!$itemsFolders) {
              throw "No report definitions found under $pbipPath"
          }

          foreach ($itemFolder in $itemsFolders) {
              $itemPath = $itemFolder.Directory.FullName
              Write-Host "Running rules for: $itemPath"
              & $toolPath -fabricitem "$itemPath" -rules "$rulesPath" -formats "ADO"
              if ($LASTEXITCODE -ne 0) {
                  throw "Fab Inspector rules failed for $itemPath with exit code $LASTEXITCODE"
              }
          }

  dax_tests:
    name: Run DAX Unit Tests
    runs-on: ubuntu-latest
    needs: validate_pbip
    if: ${{ needs.validate_pbip.result == 'success' && vars.PBIP_CI_SKIP_DAX_TESTS != 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install semantic-link-labs
        run: pip install semantic-link-labs

      - name: Execute DAX unit tests
        run: python shared/tests/run_dax_tests.py --model-path "${{ env.PBIP_PATH }}"

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dax-test-results
          path: test-results/*.xml
          if-no-files-found: warn

  publish_artifacts:
    name: Publish PBIP Artifacts
    runs-on: ubuntu-latest
    needs:
      - validate_pbip
      - dataset_rules
      - report_rules
      - dax_tests
    if: >-
      ${{
        always() &&
        vars.PBIP_CI_SKIP_PUBLISH != 'true' &&
        needs.validate_pbip.result == 'success' &&
        (needs.dataset_rules.result == 'success' || needs.dataset_rules.result == 'skipped') &&
        (needs.report_rules.result == 'success' || needs.report_rules.result == 'skipped') &&
        (needs.dax_tests.result == 'success' || needs.dax_tests.result == 'skipped')
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload PBIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbip-artifacts
          path: ${{ env.PBIP_PATH }}
          if-no-files-found: error

  deploy_dev:
    name: Deploy to Dev Workspace
    runs-on: windows-latest
    needs: publish_artifacts
    if: ${{ github.event_name != 'pull_request' && needs.publish_artifacts.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PBIP artifacts
        uses: actions/download-artifact@v4
        with:
          name: pbip-artifacts
          path: pbip-drop

      - name: Deploy PBIP to Dev workspace
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          DEV_WORKSPACE_ID: ${{ secrets.DEV_WORKSPACE_ID }}
          DEV_WORKSPACE_NAME: ${{ vars.DEV_WORKSPACE_NAME }}
        run: |
          $requiredVariables = @{
              TENANT_ID = $env:TENANT_ID
              APP_ID = $env:APP_ID
              CLIENT_SECRET = $env:CLIENT_SECRET
          }

          foreach ($variableName in $requiredVariables.Keys) {
              if ([string]::IsNullOrWhiteSpace($requiredVariables[$variableName])) {
                  throw "Missing required GitHub secret: $variableName"
              }
          }

          if ([string]::IsNullOrWhiteSpace($env:DEV_WORKSPACE_ID) -and [string]::IsNullOrWhiteSpace($env:DEV_WORKSPACE_NAME)) {
              throw "Set DEV_WORKSPACE_ID (secret) or DEV_WORKSPACE_NAME (repository/environment variable)."
          }

          $deployScriptPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:DEPLOY_SCRIPT_PATH"
          if (!(Test-Path $deployScriptPath)) {
              throw "Deployment script not found: $deployScriptPath"
          }

          $artifactPath = Join-Path "$env:GITHUB_WORKSPACE" "pbip-drop"
          if (!(Test-Path $artifactPath)) {
              throw "Downloaded PBIP artifact folder not found: $artifactPath"
          }

          & $deployScriptPath `
            -Branch "$env:GITHUB_REF" `
            -TenantId $env:TENANT_ID `
            -AppId $env:APP_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -DevWorkspaceId $env:DEV_WORKSPACE_ID `
            -DevWorkspaceName $env:DEV_WORKSPACE_NAME `
            -PbipPath $artifactPath

  deploy_feature:
    name: Deploy to Feature Workspace
    runs-on: windows-latest
    needs: publish_artifacts
    if: ${{ github.event_name != 'pull_request' && needs.publish_artifacts.result == 'success' && startsWith(github.ref, 'refs/heads/feature/') }}
    environment: feature
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PBIP artifacts
        uses: actions/download-artifact@v4
        with:
          name: pbip-artifacts
          path: pbip-drop

      - name: Deploy PBIP to feature workspace
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          DEV_WORKSPACE_ID: ${{ secrets.DEV_WORKSPACE_ID }}
          DEV_WORKSPACE_NAME: ${{ vars.DEV_WORKSPACE_NAME }}
          FEATURE_WORKSPACE_PREFIX: ${{ vars.FEATURE_WORKSPACE_PREFIX }}
        run: |
          $requiredVariables = @{
              TENANT_ID = $env:TENANT_ID
              APP_ID = $env:APP_ID
              CLIENT_SECRET = $env:CLIENT_SECRET
              FEATURE_WORKSPACE_PREFIX = $env:FEATURE_WORKSPACE_PREFIX
          }

          foreach ($variableName in $requiredVariables.Keys) {
              if ([string]::IsNullOrWhiteSpace($requiredVariables[$variableName])) {
                  throw "Missing required setting for feature deployment: $variableName"
              }
          }

          $deployScriptPath = Join-Path "$env:GITHUB_WORKSPACE" "$env:DEPLOY_SCRIPT_PATH"
          if (!(Test-Path $deployScriptPath)) {
              throw "Deployment script not found: $deployScriptPath"
          }

          $artifactPath = Join-Path "$env:GITHUB_WORKSPACE" "pbip-drop"
          if (!(Test-Path $artifactPath)) {
              throw "Downloaded PBIP artifact folder not found: $artifactPath"
          }

          & $deployScriptPath `
            -Branch "$env:GITHUB_REF" `
            -TenantId $env:TENANT_ID `
            -AppId $env:APP_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -DevWorkspaceId $env:DEV_WORKSPACE_ID `
            -DevWorkspaceName $env:DEV_WORKSPACE_NAME `
            -FeatureWorkspacePrefix $env:FEATURE_WORKSPACE_PREFIX `
            -PbipPath $artifactPath

