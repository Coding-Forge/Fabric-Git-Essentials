# azure-pipelines.yml
# Combined CI/CD pipeline for Microsoft Fabric PBIP artifacts.
#
# Deploy stages require these variables to be defined in the pipeline UI or a linked variable group:
# - TenantId
# - AppId
# - ClientSecret
# - DevWorkspaceId
# - FeatureWorkspacePrefix (feature branches only)
#
# The service principal must be allowed by tenant settings and added to the target Fabric workspace.

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'windows-2022'

variables:
  - group: pbip-shared-secrets
  - name: PROJECT_ROOT
    value: 'shared'
  - name: PBIP_PATH
    value: 'shared/pbip-local'
  - name: PYTHON_VERSION
    value: '3.11'
  - name: DEPLOY_SCRIPT_PATH
    value: 'scripts/deploy-dynamic.ps1'
  - name: DEV_WORKSPACE_NAME
    value: 'Git-Essentials'

stages:
# -----------------------------------------------------------------------------------------------------
# Stage 1 - Validate PBIP artifacts
# -----------------------------------------------------------------------------------------------------
- stage: Validate
  displayName: 'Validate PBIP Artifacts'
  jobs:
    - job: ValidatePBIP
      displayName: 'Validate PBIP Structure'
      steps:
        - checkout: self

        - task: UsePythonVersion@0
          inputs:
            versionSpec: '$(PYTHON_VERSION)'
          displayName: 'Set Python version to: $(PYTHON_VERSION)'

        - script: |
            python $(PROJECT_ROOT)/tests/validate_pbip_structure.py --pbip-path "$(PBIP_PATH)"
          displayName: 'Run PBIP structure validation'

    - job: Build_Datasets
      displayName: 'Run Dataset Quality Rules'
      dependsOn: ValidatePBIP
      steps:
        - checkout: self

        - task: PowerShell@2
          displayName: 'Download Tabular Editor and fallback rules'
          inputs:
            targetType: 'inline'
            script: |
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "TE"

              New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
              New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

              Write-Host "##[debug]Downloading Tabular Editor binaries"
              $downloadUrl = "https://github.com/TabularEditor/TabularEditor/releases/latest/download/TabularEditor.Portable.zip"
              $zipFile = Join-Path $tempPath "TabularEditor.zip"
              Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
              Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

              Write-Host "##[debug]Downloading dataset fallback rules"
              $rulesUrl = "https://raw.githubusercontent.com/microsoft/Analysis-Services/master/BestPracticeRules/BPARules.json"
              Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Dataset.fallback.json")

        - task: PowerShell@2
          displayName: 'Prepare dataset rules for branch policy'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $sourceRulesPath = Join-Path $repoPath "Rules-Dataset.json"
              if (!(Test-Path $sourceRulesPath)) {
                  $sourceRulesPath = Join-Path $tempPath "Rules-Dataset.fallback.json"
              }

              $effectiveRulesPath = Join-Path $tempPath "Rules-Dataset.effective.json"
              $qualityBranch = "$(Build.SourceBranch)"
              $pullRequestTargetBranch = "$(System.PullRequest.TargetBranch)"
              if (![string]::IsNullOrWhiteSpace($pullRequestTargetBranch) -and $pullRequestTargetBranch -notlike '$(*') {
                  $qualityBranch = $pullRequestTargetBranch
              }

              & (Join-Path $repoPath "scripts\Prepare-QualityRules.ps1") `
                -Mode dataset `
                -SourcePath $sourceRulesPath `
                -OutputPath $effectiveRulesPath `
                -SourceBranch $qualityBranch

        - task: PowerShell@2
          displayName: 'Run dataset rules'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $pbipPath = Join-Path "$(Build.SourcesDirectory)" "$(PBIP_PATH)"
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "TE\TabularEditor.exe"
              $rulesPath = Join-Path $tempPath "Rules-Dataset.effective.json"

              if (!(Test-Path $toolPath)) {
                  throw "Tabular Editor executable not found: $toolPath"
              }

              if (!(Test-Path $rulesPath)) {
                  throw "Prepared dataset rules not found: $rulesPath"
              }

              $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include ("*.pbidataset", "*.pbism")
              if (!$itemsFolders) {
                  throw "No semantic model definitions found under $pbipPath"
              }

              foreach ($itemFolder in $itemsFolders) {
                  $itemPath = Join-Path $itemFolder.Directory.FullName "definition"
                  if (!(Test-Path $itemPath)) {
                      $itemPath = Join-Path $itemFolder.Directory.FullName "model.bim"
                      if (!(Test-Path $itemPath)) {
                          throw "Cannot find semantic model definition for $($itemFolder.FullName)"
                      }
                  }

                  Write-Host "##[group]Running rules for: '$itemPath'"
                  $process = Start-Process -FilePath $toolPath -ArgumentList """$itemPath"" -A ""$rulesPath"" -V" -NoNewWindow -Wait -PassThru
                  Write-Host "##[endgroup]"

                  if ($process.ExitCode -ne 0) {
                      throw "Tabular Editor rules failed for $itemPath with exit code $($process.ExitCode)"
                  }
              }

    - job: Build_Reports
      displayName: 'Run Report Quality Rules'
      dependsOn: ValidatePBIP
      steps:
        - checkout: self

        - task: PowerShell@2
          displayName: 'Download Fab Inspector and fallback rules'
          inputs:
            targetType: 'inline'
            script: |
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "PBIInspector"

              New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
              New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

              Write-Host "##[debug]Downloading Fab Inspector"
              $downloadUrl = "https://github.com/NatVanG/PBI-InspectorV2/releases/latest/download/win-x64-CLI.zip"
              $zipFile = Join-Path $tempPath "PBIRInspector.zip"
              Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
              Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

              Write-Host "##[debug]Downloading report fallback rules"
              $rulesUrl = "https://raw.githubusercontent.com/NatVanG/PBI-InspectorV2/main/Rules/Base-rules.json"
              Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Report.fallback.json")

        - task: PowerShell@2
          displayName: 'Prepare report rules for branch policy'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $sourceRulesPath = Join-Path $repoPath "Rules-Report.json"
              if (!(Test-Path $sourceRulesPath)) {
                  $sourceRulesPath = Join-Path $tempPath "Rules-Report.fallback.json"
              }

              $effectiveRulesPath = Join-Path $tempPath "Rules-Report.effective.json"
              $qualityBranch = "$(Build.SourceBranch)"
              $pullRequestTargetBranch = "$(System.PullRequest.TargetBranch)"
              if (![string]::IsNullOrWhiteSpace($pullRequestTargetBranch) -and $pullRequestTargetBranch -notlike '$(*') {
                  $qualityBranch = $pullRequestTargetBranch
              }

              & (Join-Path $repoPath "scripts\Prepare-QualityRules.ps1") `
                -Mode report `
                -SourcePath $sourceRulesPath `
                -OutputPath $effectiveRulesPath `
                -SourceBranch $qualityBranch

        - task: PowerShell@2
          displayName: 'Run report rules'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $pbipPath = Join-Path "$(Build.SourcesDirectory)" "$(PBIP_PATH)"
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "PBIInspector\win-x64\CLI\PBIRInspectorCLI.exe"
              $rulesPath = Join-Path $tempPath "Rules-Report.effective.json"

              if (!(Test-Path $toolPath)) {
                  throw "Fab Inspector executable not found: $toolPath"
              }

              if (!(Test-Path $rulesPath)) {
                  throw "Prepared report rules not found: $rulesPath"
              }

              $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include *.pbir
              if (!$itemsFolders) {
                  throw "No report definitions found under $pbipPath"
              }

              foreach ($itemFolder in $itemsFolders) {
                  $itemPath = $itemFolder.Directory.FullName

                  Write-Host "##[group]Running rules for: '$itemPath'"
                  $process = Start-Process -FilePath $toolPath -ArgumentList "-fabricitem ""$itemPath"" -rules ""$rulesPath"" -formats ""ADO""" -NoNewWindow -Wait -PassThru
                  Write-Host "##[endgroup]"

                  if ($process.ExitCode -ne 0) {
                      throw "Fab Inspector rules failed for $itemPath with exit code $($process.ExitCode)"
                  }
              }

# -----------------------------------------------------------------------------------------------------
# Stage 2 - Run DAX unit tests
# -----------------------------------------------------------------------------------------------------
- stage: Test
  displayName: 'DAX Unit Tests'
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - job: DaxTests
      displayName: 'Run DAX measure tests'
      steps:
        - checkout: self

        - task: UsePythonVersion@0
          inputs:
            versionSpec: '$(PYTHON_VERSION)'
          displayName: 'Set Python version'

        - script: |
            pip install semantic-link-labs
          displayName: 'Install semantic-link-labs'

        - script: |
            python $(PROJECT_ROOT)/tests/run_dax_tests.py --model-path "$(PBIP_PATH)"
          displayName: 'Execute DAX unit tests'

        - task: PublishTestResults@2
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '**/test-results/*.xml'
            failTaskOnFailedTests: true
          displayName: 'Publish test results'

# -----------------------------------------------------------------------------------------------------
# Stage 3 - Publish deployable PBIP artifact
# -----------------------------------------------------------------------------------------------------
- stage: Publish
  displayName: 'Publish Artifacts'
  dependsOn: Test
  condition: succeeded()
  jobs:
    - job: PublishArtifacts
      displayName: 'Package and publish PBIP artifacts'
      steps:
        - checkout: self

        - task: PublishPipelineArtifact@1
          inputs:
            targetPath: '$(Build.SourcesDirectory)/$(PROJECT_ROOT)'
            artifact: 'pbip-drop'
            publishLocation: 'pipeline'
          displayName: 'Publish PBIP artifact'

# -----------------------------------------------------------------------------------------------------
# Stage 4 - Deploy to Dev workspace
# -----------------------------------------------------------------------------------------------------
- stage: Deploy_Dev
  displayName: 'Deploy to Dev Workspace'
  dependsOn: Publish
  condition: |
    and(
      succeeded(),
      or(
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      )
    )
  jobs:
    - job: DeployDev
      displayName: 'Deploy PBIP to Dev'
      steps:
        - download: current
          artifact: pbip-drop

        - task: PowerShell@2
          displayName: 'Deploy PBIP to Dev workspace'
          env:
            TENANT_ID: $(TenantId)
            APP_ID: $(AppId)
            CLIENT_SECRET: $(ClientSecret)
            DEV_WORKSPACE_ID: $(DevWorkspaceId)
            DEV_WORKSPACE_NAME: $(DEV_WORKSPACE_NAME)
          inputs:
            targetType: 'inline'
            script: |
              $artifactPath = Join-Path "$(Pipeline.Workspace)" "pbip-drop"
              $deployScriptPath = Join-Path $artifactPath "$(DEPLOY_SCRIPT_PATH)"
              $pbipPath = Join-Path $artifactPath "pbip-local"
              $requiredVariables = @{
                  TenantId = $env:TENANT_ID
                  AppId = $env:APP_ID
                  ClientSecret = $env:CLIENT_SECRET
              }

              foreach ($variableName in $requiredVariables.Keys) {
                  $value = $requiredVariables[$variableName]
                  if ([string]::IsNullOrWhiteSpace($value) -or $value -like '$(*') {
                      throw "Missing required deployment variable: $variableName"
                  }
              }

              if (!(Test-Path $deployScriptPath)) {
                  throw "Deployment script not found: $deployScriptPath. Add scripts/deploy-dynamic.ps1 or update DEPLOY_SCRIPT_PATH."
              }

              if (!(Test-Path $pbipPath)) {
                  throw "PBIP path not found in artifact: $pbipPath"
              }

              if ([string]::IsNullOrWhiteSpace($env:DEV_WORKSPACE_ID) -and [string]::IsNullOrWhiteSpace($env:DEV_WORKSPACE_NAME)) {
                  throw "Missing Dev workspace target. Set DevWorkspaceId in the variable group or DEV_WORKSPACE_NAME in azure-pipelines.yml."
              }

              & $deployScriptPath `
                -Branch "$(Build.SourceBranch)" `
                -TenantId $env:TENANT_ID `
                -AppId $env:APP_ID `
                -ClientSecret $env:CLIENT_SECRET `
                -DevWorkspaceId $env:DEV_WORKSPACE_ID `
                -DevWorkspaceName $env:DEV_WORKSPACE_NAME `
                -PbipPath $pbipPath

# -----------------------------------------------------------------------------------------------------
# Stage 5 - Deploy to feature workspace
# -----------------------------------------------------------------------------------------------------
- stage: Deploy_Feature
  displayName: 'Deploy to Feature Workspace'
  dependsOn: Publish
  condition: |
    and(
      succeeded(),
      startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')
    )
  jobs:
    - job: DeployFeature
      displayName: 'Create or update feature workspace'
      steps:
        - download: current
          artifact: pbip-drop

        - task: PowerShell@2
          displayName: 'Deploy PBIP to feature workspace'
          env:
            TENANT_ID: $(TenantId)
            APP_ID: $(AppId)
            CLIENT_SECRET: $(ClientSecret)
            DEV_WORKSPACE_ID: $(DevWorkspaceId)
            DEV_WORKSPACE_NAME: $(DEV_WORKSPACE_NAME)
            FEATURE_WORKSPACE_PREFIX: $(FeatureWorkspacePrefix)
          inputs:
            targetType: 'inline'
            script: |
              $artifactPath = Join-Path "$(Pipeline.Workspace)" "pbip-drop"
              $deployScriptPath = Join-Path $artifactPath "$(DEPLOY_SCRIPT_PATH)"
              $pbipPath = Join-Path $artifactPath "pbip-local"
              $requiredVariables = @{
                  TenantId = $env:TENANT_ID
                  AppId = $env:APP_ID
                  ClientSecret = $env:CLIENT_SECRET
                  FeatureWorkspacePrefix = $env:FEATURE_WORKSPACE_PREFIX
              }

              foreach ($variableName in $requiredVariables.Keys) {
                  $value = $requiredVariables[$variableName]
                  if ([string]::IsNullOrWhiteSpace($value) -or $value -like '$(*') {
                      throw "Missing required deployment variable: $variableName"
                  }
              }

              if (!(Test-Path $deployScriptPath)) {
                  throw "Deployment script not found: $deployScriptPath. Add scripts/deploy-dynamic.ps1 or update DEPLOY_SCRIPT_PATH."
              }

              if (!(Test-Path $pbipPath)) {
                  throw "PBIP path not found in artifact: $pbipPath"
              }

              & $deployScriptPath `
                -Branch "$(Build.SourceBranch)" `
                -TenantId $env:TENANT_ID `
                -AppId $env:APP_ID `
                -ClientSecret $env:CLIENT_SECRET `
                -DevWorkspaceId $env:DEV_WORKSPACE_ID `
                -DevWorkspaceName $env:DEV_WORKSPACE_NAME `
                -FeatureWorkspacePrefix $env:FEATURE_WORKSPACE_PREFIX `
                -PbipPath $pbipPath

