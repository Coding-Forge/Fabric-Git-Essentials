# templates/fabric-ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Universal Fabric CI template.
# Consumed by individual project repos via "extends:".
#
# Parameters with defaults can be overridden in each consumer's
# azure-pipelines.yml.  Required parameters must be supplied.
# ─────────────────────────────────────────────────────────────────────────────

parameters:

  # ── Paths ────────────────────────────────────────────────────────────────
  - name: pbipPath
    displayName: 'Path to PBIP artifacts (relative to repo root)'
    type: string
    default: 'pbip-local'

  - name: projectRoot
    displayName: 'Repo root offset (use . for root)'
    type: string
    default: '.'

  # ── Tooling ──────────────────────────────────────────────────────────────
  - name: pythonVersion
    displayName: 'Python version for test jobs'
    type: string
    default: '3.11'

  # ── Rules overrides ──────────────────────────────────────────────────────
  # Leave empty to auto-discover Rules-Dataset.json / Rules-Report.json
  # from the consumer repo root.  Useful when rules live in a subfolder.
  - name: rulesDatasetPath
    displayName: 'Path to dataset rules JSON (relative to repo root)'
    type: string
    default: ''

  - name: rulesReportPath
    displayName: 'Path to report rules JSON (relative to repo root)'
    type: string
    default: ''

  # ── Feature flags ────────────────────────────────────────────────────────
  - name: skipDatasetRules
    displayName: 'Skip Tabular Editor dataset rules job'
    type: boolean
    default: false

  - name: skipReportRules
    displayName: 'Skip PBI Inspector report rules job'
    type: boolean
    default: false

  - name: skipDaxTests
    displayName: 'Skip DAX unit test job'
    type: boolean
    default: false

  - name: skipPublish
    displayName: 'Skip artifact publish stage'
    type: boolean
    default: false

  # ── Template repo reference ───────────────────────────────────────────────
  # Name of the ADO repository resource declared in the consumer pipeline.
  # Must match the "repository:" alias in the consumer's resources block.
  - name: templatesRepoAlias
    displayName: 'Repository alias for the templates repo'
    type: string
    default: 'fabric-pipeline-templates'

stages:
# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Validate
# ─────────────────────────────────────────────────────────────────────────────
- stage: Validate
  displayName: 'Validate PBIP Artifacts'
  variables:
    PBIP_PATH:    ${{ parameters.pbipPath }}
    PROJECT_ROOT: ${{ parameters.projectRoot }}
    PYTHON_VERSION: ${{ parameters.pythonVersion }}
    TEMPLATES_REPO: ${{ parameters.templatesRepoAlias }}

  jobs:

  # ── Structure validation ─────────────────────────────────────────────────
  - job: ValidatePBIP
    displayName: 'Validate PBIP Structure'
    steps:
      - checkout: self
      - checkout: ${{ parameters.templatesRepoAlias }}

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '$(PYTHON_VERSION)'
        displayName: 'Set Python version to: $(PYTHON_VERSION)'

      - script: |
          python $(TEMPLATES_REPO)/tests/validate_pbip_structure.py --pbip-path "$(PBIP_PATH)"
        displayName: 'Run PBIP structure validation'

  # ── Dataset quality rules ────────────────────────────────────────────────
  - ${{ if eq(parameters.skipDatasetRules, false) }}:
    - job: Build_Datasets
      displayName: 'Run Dataset Quality Rules'
      dependsOn: ValidatePBIP
      variables:
        RULES_DATASET_OVERRIDE: ${{ parameters.rulesDatasetPath }}
      steps:
        - checkout: self
        - checkout: ${{ parameters.templatesRepoAlias }}

        - task: PowerShell@2
          displayName: 'Download Tabular Editor and fallback rules'
          inputs:
            targetType: 'inline'
            script: |
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "TE"

              New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
              New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

              Write-Host "##[debug]Downloading Tabular Editor binaries"
              $downloadUrl = "https://github.com/TabularEditor/TabularEditor/releases/latest/download/TabularEditor.Portable.zip"
              $zipFile = Join-Path $tempPath "TabularEditor.zip"
              Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
              Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

              Write-Host "##[debug]Downloading dataset fallback rules"
              $rulesUrl = "https://raw.githubusercontent.com/microsoft/Analysis-Services/master/BestPracticeRules/BPARules.json"
              Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Dataset.fallback.json")

        - task: PowerShell@2
          displayName: 'Prepare dataset rules for branch policy'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath     = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $tempPath     = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $templatesPath = Join-Path "$(Build.SourcesDirectory)" "$(TEMPLATES_REPO)"

              # Resolve rules: parameter override → repo root → fallback
              $overridePath = "$(RULES_DATASET_OVERRIDE)"
              if ($overridePath) {
                  $sourceRulesPath = Join-Path $repoPath $overridePath
              } else {
                  $sourceRulesPath = Join-Path $repoPath "Rules-Dataset.json"
              }
              if (!(Test-Path $sourceRulesPath)) {
                  $sourceRulesPath = Join-Path $tempPath "Rules-Dataset.fallback.json"
              }

              $effectiveRulesPath = Join-Path $tempPath "Rules-Dataset.effective.json"
              $qualityBranch = "$(Build.SourceBranch)"
              $pullRequestTargetBranch = "$(System.PullRequest.TargetBranch)"
              if (![string]::IsNullOrWhiteSpace($pullRequestTargetBranch) -and $pullRequestTargetBranch -notlike '$(*') {
                  $qualityBranch = $pullRequestTargetBranch
              }

              & (Join-Path $templatesPath "scripts\Prepare-QualityRules.ps1") `
                -Mode dataset `
                -SourcePath $sourceRulesPath `
                -OutputPath $effectiveRulesPath `
                -SourceBranch $qualityBranch

        - task: PowerShell@2
          displayName: 'Run dataset rules'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath   = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $pbipPath   = Join-Path $repoPath "$(PBIP_PATH)"
              $tempPath   = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath   = Join-Path $tempPath "TE\TabularEditor.exe"
              $rulesPath  = Join-Path $tempPath "Rules-Dataset.effective.json"

              if (!(Test-Path $toolPath))  { throw "Tabular Editor executable not found: $toolPath" }
              if (!(Test-Path $rulesPath)) { throw "Prepared dataset rules not found: $rulesPath" }

              $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include ("*.pbidataset", "*.pbism")
              if (!$itemsFolders) { throw "No semantic model definitions found under $pbipPath" }

              foreach ($itemFolder in $itemsFolders) {
                  $itemPath = Join-Path $itemFolder.Directory.FullName "definition"
                  if (!(Test-Path $itemPath)) {
                      $itemPath = Join-Path $itemFolder.Directory.FullName "model.bim"
                      if (!(Test-Path $itemPath)) {
                          throw "Cannot find semantic model definition for $($itemFolder.FullName)"
                      }
                  }

                  Write-Host "##[group]Running rules for: '$itemPath'"
                  $process = Start-Process -FilePath $toolPath `
                      -ArgumentList """$itemPath"" -A ""$rulesPath"" -V" `
                      -NoNewWindow -Wait -PassThru
                  Write-Host "##[endgroup]"

                  if ($process.ExitCode -ne 0) {
                      throw "Tabular Editor rules failed for $itemPath (exit code $($process.ExitCode))"
                  }
              }

  # ── Report quality rules ─────────────────────────────────────────────────
  - ${{ if eq(parameters.skipReportRules, false) }}:
    - job: Build_Reports
      displayName: 'Run Report Quality Rules'
      dependsOn: ValidatePBIP
      variables:
        RULES_REPORT_OVERRIDE: ${{ parameters.rulesReportPath }}
      steps:
        - checkout: self
        - checkout: ${{ parameters.templatesRepoAlias }}

        - task: PowerShell@2
          displayName: 'Download Fab Inspector and fallback rules'
          inputs:
            targetType: 'inline'
            script: |
              $tempPath = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath = Join-Path $tempPath "PBIInspector"

              New-Item -ItemType Directory -Path $tempPath -Force | Out-Null
              New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

              Write-Host "##[debug]Downloading Fab Inspector"
              $downloadUrl = "https://github.com/NatVanG/PBI-InspectorV2/releases/latest/download/win-x64-CLI.zip"
              $zipFile = Join-Path $tempPath "PBIRInspector.zip"
              Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
              Expand-Archive -Path $zipFile -DestinationPath $toolPath -Force

              Write-Host "##[debug]Downloading report fallback rules"
              $rulesUrl = "https://raw.githubusercontent.com/NatVanG/PBI-InspectorV2/main/Rules/Base-rules.json"
              Invoke-WebRequest -Uri $rulesUrl -OutFile (Join-Path $tempPath "Rules-Report.fallback.json")

        - task: PowerShell@2
          displayName: 'Prepare report rules for branch policy'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath      = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $tempPath      = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $templatesPath = Join-Path "$(Build.SourcesDirectory)" "$(TEMPLATES_REPO)"

              # Resolve rules: parameter override → repo root → fallback
              $overridePath = "$(RULES_REPORT_OVERRIDE)"
              if ($overridePath) {
                  $sourceRulesPath = Join-Path $repoPath $overridePath
              } else {
                  $sourceRulesPath = Join-Path $repoPath "Rules-Report.json"
              }
              if (!(Test-Path $sourceRulesPath)) {
                  $sourceRulesPath = Join-Path $tempPath "Rules-Report.fallback.json"
              }

              $effectiveRulesPath = Join-Path $tempPath "Rules-Report.effective.json"
              $qualityBranch = "$(Build.SourceBranch)"
              $pullRequestTargetBranch = "$(System.PullRequest.TargetBranch)"
              if (![string]::IsNullOrWhiteSpace($pullRequestTargetBranch) -and $pullRequestTargetBranch -notlike '$(*') {
                  $qualityBranch = $pullRequestTargetBranch
              }

              & (Join-Path $templatesPath "scripts\Prepare-QualityRules.ps1") `
                -Mode report `
                -SourcePath $sourceRulesPath `
                -OutputPath $effectiveRulesPath `
                -SourceBranch $qualityBranch

        - task: PowerShell@2
          displayName: 'Run report rules'
          inputs:
            targetType: 'inline'
            script: |
              $repoPath   = Join-Path "$(Build.SourcesDirectory)" "$(PROJECT_ROOT)"
              $pbipPath   = Join-Path $repoPath "$(PBIP_PATH)"
              $tempPath   = Join-Path "$(Agent.TempDirectory)" "pbip-quality"
              $toolPath   = Join-Path $tempPath "PBIInspector\win-x64\CLI\PBIRInspectorCLI.exe"
              $rulesPath  = Join-Path $tempPath "Rules-Report.effective.json"

              if (!(Test-Path $toolPath))  { throw "Fab Inspector executable not found: $toolPath" }
              if (!(Test-Path $rulesPath)) { throw "Prepared report rules not found: $rulesPath" }

              $itemsFolders = Get-ChildItem -Path $pbipPath -Recurse -Include *.pbir
              if (!$itemsFolders) { throw "No report definitions found under $pbipPath" }

              foreach ($itemFolder in $itemsFolders) {
                  $itemPath = $itemFolder.Directory.FullName
                  Write-Host "##[group]Running rules for: '$itemPath'"
                  $process = Start-Process -FilePath $toolPath `
                      -ArgumentList "-fabricitem ""$itemPath"" -rules ""$rulesPath"" -formats ""ADO""" `
                      -NoNewWindow -Wait -PassThru
                  Write-Host "##[endgroup]"

                  if ($process.ExitCode -ne 0) {
                      throw "Fab Inspector rules failed for $itemPath (exit code $($process.ExitCode))"
                  }
              }

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Test
# ─────────────────────────────────────────────────────────────────────────────
- ${{ if eq(parameters.skipDaxTests, false) }}:
  - stage: Test
    displayName: 'DAX Unit Tests'
    dependsOn: Validate
    condition: succeeded()
    variables:
      PBIP_PATH:      ${{ parameters.pbipPath }}
      PYTHON_VERSION: ${{ parameters.pythonVersion }}
      TEMPLATES_REPO: ${{ parameters.templatesRepoAlias }}
    jobs:
    - job: DaxTests
      displayName: 'Run DAX measure tests'
      steps:
      - checkout: self
      - checkout: ${{ parameters.templatesRepoAlias }}

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '$(PYTHON_VERSION)'
        displayName: 'Set Python version'

      - script: pip install semantic-link-labs
        displayName: 'Install semantic-link-labs'

      - script: |
          python $(TEMPLATES_REPO)/tests/run_dax_tests.py --model-path "$(PBIP_PATH)"
        displayName: 'Execute DAX unit tests'

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/test-results/*.xml'
          failTaskOnFailedTests: true
        displayName: 'Publish test results'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Publish
# ─────────────────────────────────────────────────────────────────────────────
- ${{ if eq(parameters.skipPublish, false) }}:
  - stage: Publish
    displayName: 'Publish Artifacts'
    dependsOn:
      - ${{ if eq(parameters.skipDaxTests, false) }}:
        - Test
      - ${{ if eq(parameters.skipDaxTests, true) }}:
        - Validate
    condition: succeeded()
    variables:
      PBIP_PATH: ${{ parameters.pbipPath }}
    jobs:
    - job: PublishArtifacts
      displayName: 'Package and publish PBIP artifacts'
      steps:
      - checkout: self

      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: '$(Build.SourcesDirectory)/$(PBIP_PATH)'
          artifactName: 'pbip-artifacts'
          publishLocation: 'Container'
        displayName: 'Publish PBIP artifacts'
